<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Players | BIP Championship</title><meta name="description" content="Official digital home of the BIP Championship.">
<link rel="stylesheet" href="assets/styles.css"><script defer src="assets/app.js"></script></head><body><div id="nav"></div>
<section class="page-hero"><div class="container"><div class="eyebrow">BIP Player Index</div><h1>Player Cards</h1><p class="lead">Career appearances, championships, round wins and personal bests.</p></div></section>
<section><div class="container"><div class="player-grid" id="players"></div></div></section><div id="footer"></div><script>document.getElementById("nav").innerHTML=layout("Player Cards");document.getElementById("footer").innerHTML=footer();getData().then(d=>document.getElementById('players').innerHTML=d.players.sort((a,b)=>b.championships-a.championships||b.appearances-a.appearances).map(p=>`<article class="player"><div class="avatar">${initials(p.name)}</div><h3>${p.name}</h3><span class="badge">Debut ${p.debut}</span><div class="mini-stats"><div><strong>${p.appearances}</strong><small>Appearances</small></div><div><strong>${p.championships}</strong><small>Titles</small></div><div><strong>${p.roundWins}</strong><small>Round Wins</small></div></div><p><small>Best 18: ${p.best18??'—'} • Best 9: ${p.best9??'—'}</small></p></article>`).join(''));</script></body></html>
