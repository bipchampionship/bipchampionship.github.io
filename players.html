<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gallery | BIP Championship</title><meta name="description" content="Official digital home of the BIP Championship.">
<link rel="stylesheet" href="assets/styles.css"><script defer src="assets/app.js"></script></head><body><div id="nav"></div>
<section class="page-hero"><div class="container"><div class="eyebrow">The BIP Vault</div><h1>Photo Gallery</h1><p class="lead">A permanent home for the moments on and off the course.</p></div></section>
<section><div class="container"><p class="edit-note">To add photos, place image files in <strong>assets/images/gallery</strong> and add the file path to <strong>assets/data/site-data.json</strong>.</p><div class="gallery" id="gallery" style="margin-top:28px"></div></div></section><div id="footer"></div><script>document.getElementById("nav").innerHTML=layout("Gallery");document.getElementById("footer").innerHTML=footer();getData().then(d=>document.getElementById('gallery').innerHTML=d.gallery.map(g=>`<div class="gallery-item" ${g.image?`style="background-image:url('${g.image}');background-size:cover;background-position:center"`:''}><div><strong>${g.year}</strong><br><small>${g.caption}</small></div></div>`).join(''));</script></body></html>
