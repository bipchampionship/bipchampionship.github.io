<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Courses | BIP Championship</title><meta name="description" content="Official digital home of the BIP Championship.">
<link rel="stylesheet" href="assets/styles.css"><script defer src="assets/app.js"></script></head><body><div id="nav"></div>
<section class="page-hero"><div class="container"><div class="eyebrow">Where history happened</div><h1>Courses Played</h1><p class="lead">A growing map of every course that has hosted a BIP round.</p></div></section>
<section><div class="container"><div class="grid-3" id="courses"></div></div></section><div id="footer"></div><script>document.getElementById("nav").innerHTML=layout("Courses");document.getElementById("footer").innerHTML=footer();getData().then(d=>document.getElementById('courses').innerHTML=d.tournaments.flatMap(t=>t.courses.map(c=>({course:c,year:t.year,location:t.location}))).map(c=>`<article class="card"><div class="card-body"><div class="card-kicker">${c.year} • ${c.location}</div><h3>${c.course}</h3><p>Add course photography, yardage, rating, slope and memorable moments here.</p></div></article>`).join(''));</script></body></html>
